<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Client box -->
  <rect x="4" y="38" width="36" height="52" rx="8" fill="rgba(14,165,233,0.12)" stroke="#0ea5e9" stroke-width="4"/>
  <line x1="12" y1="53" x2="32" y2="53" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="62" x2="28" y2="62" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="12" y1="71" x2="24" y2="71" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>

  <!-- Server box -->
  <rect x="88" y="38" width="36" height="52" rx="8" fill="rgba(129,140,248,0.12)" stroke="#818cf8" stroke-width="4"/>
  <line x1="96" y1="53" x2="116" y2="53" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="96" y1="62" x2="112" y2="62" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="96" y1="71" x2="108" y2="71" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>

  <!-- Request arrow → -->
  <line x1="44" y1="56" x2="83" y2="56" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
  <polyline points="74,49 85,56 74,63" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Response arrow ← -->
  <line x1="84" y1="72" x2="45" y2="72" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <polyline points="54,65 43,72 54,79" fill="none" stroke="#818cf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
